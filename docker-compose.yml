version: "3.9"

services:
  app:
    build: .

    ports:
      - "3000:3000"

    depends_on:
      - db
      - redis

    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - .:/app
      - /app/node_modules

    command: sh -c "npx prisma generate && npm run dev"

  db:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: